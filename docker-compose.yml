version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: file:/app/data/dev.db
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-3000}
      MOCK_AUTH: ${MOCK_AUTH:-1}
      MOCK_VOICE: ${MOCK_VOICE:-1}
      MOCK_LLM: ${MOCK_LLM:-1}
      MOCK_REVIEW: ${MOCK_REVIEW:-1}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
